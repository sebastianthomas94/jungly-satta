services:
  - type: web
    name: jungly-satta-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: npx prisma db push --skip-generate && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ROUND_DURATION_MS
        value: 30000
      - key: BETTING_CUTOFF_MS
        value: 5000
      - key: RESULT_DISPLAY_MS
        value: 3000

  - type: static
    name: jungly-satta-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false